spring:
  application:
    name: java-clean-architect
  datasource:
    url: jdbc:postgresql://localhost:5432/cleanarch
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate # schema changes ONLY via Flyway migrations
    open-in-view: false
  flyway:
    enabled: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info # expose more only when something consumes it
  endpoint:
    health:
      probes:
        enabled: true # /actuator/health/{liveness,readiness} for k8s

# One-command local stack: docker compose up --build
services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: cleanarch
      POSTGRES_PASSWORD: postgres
    ports:
      - "${DB_PORT:-5432}:5432" # override when 5432 is taken: DB_PORT=5544 docker compose up
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cleanarch"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    ports:
      - "${APP_PORT:-8080}:8080" # override when 8080 is taken: APP_PORT=8099 docker compose up
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/cleanarch
    depends_on:
      db:
        condition: service_healthy

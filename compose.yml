# One-command local stack: docker compose up --build
services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: cleanarch
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cleanarch"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/cleanarch
    depends_on:
      db:
        condition: service_healthy
